@'
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sweatcontrol
data:
  DB_HOST: mysql-service
  DB_PORT: "3306"
  DB_USER: sweatcontrol_user
  DB_NAME: sweatcontrol_products_db
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka-service:9092
  PRODUCT_SERVICE_URL: http://product-service:3001
  CART_SERVICE_URL: http://cart-service:3002
  ORDER_SERVICE_URL: http://order-service:3003
  INVENTORY_SERVICE_URL: http://inventory-service:3004
  PAYMENT_SERVICE_URL: http://payment-service:3005
  NOTIFICATION_SERVICE_URL: http://notification-service:3006
  NODE_ENV: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: sweatcontrol
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS sweatcontrol_products_db;
    CREATE DATABASE IF NOT EXISTS sweatcontrol_carts_db;
    CREATE DATABASE IF NOT EXISTS sweatcontrol_orders_db;
    CREATE DATABASE IF NOT EXISTS sweatcontrol_inventory_db;
    CREATE DATABASE IF NOT EXISTS sweatcontrol_payments_db;
'@ | Out-File -FilePath kubernetes\configmaps\app-config.yaml -Encoding utf8