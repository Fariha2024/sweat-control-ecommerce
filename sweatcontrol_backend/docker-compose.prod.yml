@'
version: '3.8'

# Production overrides for docker-compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  product-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cart-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  order-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  inventory-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  payment-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  notification-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-gateway:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Production database settings
  mysql:
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    restart: always
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"

  # Resource limits
  product-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  cart-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  order-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  inventory-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  payment-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  notification-service:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api-gateway:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
'@ | Out-File -FilePath docker-compose.prod.yml -Encoding utf8