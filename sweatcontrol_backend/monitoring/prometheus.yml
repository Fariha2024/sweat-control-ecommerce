@'
# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: sweatcontrol

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets:
        - node-exporter:9100
        - '${NODE_IP}:9100'

  - job_name: 'ecs-services'
    static_configs:
      - targets:
        - 'product-service:3001'
        - 'cart-service:3002'
        - 'order-service:3003'
        - 'inventory-service:3004'
        - 'payment-service:3005'
        - 'notification-service:3006'
        - 'api-gateway:3000'
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
'@ | Out-File -FilePath ..\monitoring\prometheus.yml -Encoding utf8