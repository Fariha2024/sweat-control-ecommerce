# Service routing configuration
routes:
  - path: /api/products
    service: product
    target: http://product-service:3001
    methods: [GET, POST, PUT, DELETE]
    rateLimit: 100

  - path: /api/reviews
    service: product
    target: http://product-service:3001
    methods: [GET, POST]
    rateLimit: 50

  - path: /api/cart
    service: cart
    target: http://cart-service:3002
    methods: [GET, POST, PUT, DELETE]
    rateLimit: 100

  - path: /api/orders
    service: order
    target: http://order-service:3003
    methods: [GET, POST, PUT]
    rateLimit: 50

  - path: /api/inventory
    service: inventory
    target: http://inventory-service:3004
    methods: [GET, POST, PUT]
    rateLimit: 100

  - path: /api/payments
    service: payment
    target: http://payment-service:3005
    methods: [POST, GET]
    rateLimit: 20

  - path: /api/notifications
    service: notification
    target: http://notification-service:3006
    methods: [POST]
    rateLimit: 10